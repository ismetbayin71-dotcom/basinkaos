<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Peter Physics v3</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #333; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; color: white; font-family: sans-serif; z-index: 100; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#e74c3c">OFFICE SABOTAGE</b><br>
        <small>Durum: Ayaklar Yere Sabitlendi</small>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const mapImg = new Image(); mapImg.src = 'map.png';
        const collImg = new Image(); collImg.src = 'collision.png';
        const charIdle = new Image(); charIdle.src = 'character.png';
        const charWalk = new Image(); charWalk.src = 'character_walk_1.png';

        let player = {
            x: 480, y: 400, // Başlangıç yerini biraz daha aşağı aldım
            width: 120, height: 180, // Peter 2X boyutu
            speed: 3.5,
            visionRadius: 360,
            isMoving: false,
            facingRight: true,
            walkDistance: 0
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionCtx = null;
        let loaded = 0;

        function checkLoad() {
            loaded++;
            if(loaded === 4) {
                initCollision();
                requestAnimationFrame(gameLoop);
            }
        }
        [mapImg, collImg, charIdle, charWalk].forEach(img => img.onload = checkLoad);

        function initCollision() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = collImg.width;
            tempCanvas.height = collImg.height;
            collisionCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            collisionCtx.drawImage(collImg, 0, 0);
        }

        function isWall(x, y) {
            if (!collisionCtx) return false;
            if (x < 0 || x >= collImg.width || y < 0 || y >= collImg.height) return true;
            const p = collisionCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
            // Kırmızı maske kontrolü (R > 150)
            return (p[0] > 150 && p[1] < 100);
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            let dx = 0, dy = 0;
            if (keys["KeyW"]) dy -= 1;
            if (keys["KeyS"]) dy += 1;
            if (keys["KeyA"]) { dx -= 1; player.facingRight = false; }
            if (keys["KeyD"]) { dx += 1; player.facingRight = true; }

            player.isMoving = (dx !== 0 || dy !== 0);

            if (player.isMoving) {
                const angle = Math.atan2(dy, dx);
                const nextX = player.x + Math.cos(angle) * player.speed;
                const nextY = player.y + Math.sin(angle) * player.speed;

                // Collision: Peter'ın ayak tabanı için geniş kontrol (fw: foot width)
                const fw = 35; 
                // Peter'ın tam ayak bastığı noktayı (player.y) kontrol ediyoruz
                if (!isWall(nextX, player.y) && !isWall(nextX - fw, player.y) && !isWall(nextX + fw, player.y)) {
                    player.x = nextX;
                }
                if (!isWall(player.x, nextY) && !isWall(player.x - fw, nextY) && !isWall(player.x + fw, nextY)) {
                    player.y = nextY;
                }
                
                player.walkDistance += player.speed;
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. HARİTA (Görüş Maskesi ile)
            ctx.save();
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.beginPath();
            ctx.arc(cx, cy, player.visionRadius, 0, Math.PI * 2);
            ctx.clip();

            ctx.translate(-camera.x, -camera.y);
            ctx.drawImage(mapImg, 0, 0);
            ctx.restore();

            // 2. YUMUŞAK SİS (Gradyan)
            const grad = ctx.createRadialGradient(cx, cy, player.visionRadius * 0.2, cx, cy, player.visionRadius);
            grad.addColorStop(0, "transparent");
            grad.addColorStop(1, "black");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. PETER (AYAKLARI YERE SIFIRLANMIŞ)
            const isWalkFrame = Math.floor(player.walkDistance / 35) % 2 === 1;
            const img = (player.isMoving && isWalkFrame) ? charWalk : charIdle;

            ctx.save();
            ctx.translate(cx, cy); 
            
            if (!player.facingRight) ctx.scale(-1, 1);
            
            // Ayak Altı Gölgesi (PETER'IN AYAKLARINA YAPIŞIK)
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.beginPath();
            // Gölgeyi tam olarak 0,0 noktasına (ayakların altına) koyduk
            ctx.ellipse(0, 0, 45, 12, 0, 0, Math.PI * 2); 
            ctx.fill();

            // Peter'ı Çiz: 
            // Görseldeki boşluğu telafi etmek için Y değerini (-player.height + 15) yaptık.
            // Bu 15 piksellik "pay", görseldeki havada kalma hissini yok eder.
            ctx.drawImage(img, -player.width/2, -player.height + 15, player.width, player.height);
            
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
