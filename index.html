<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Gore Edition</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #050505; border: 2px solid #333; cursor: none; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; color: white; font-family: sans-serif; z-index: 100; border: 1px solid #444; }
        .game-btn { position: absolute; bottom: 40px; width: 95px; height: 95px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Arial Black', sans-serif; font-size: 12px; font-weight: bold; transition: all 0.2s ease; user-select: none; border: 4px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.2); text-align: center; }
        #killBtn { right: 40px; background: rgba(255, 0, 0, 0.1); }
        #killBtn.active { background: rgba(220, 0, 0, 0.9); border-color: #fff; color: #fff; box-shadow: 0 0 25px #ff0000; transform: scale(1.1); }
        #sabotageBtn { right: 155px; background: rgba(255, 140, 0, 0.1); }
        #sabotageBtn.active { background: rgba(255, 140, 0, 0.9); border-color: #fff; color: #fff; box-shadow: 0 0 25px #ffa500; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#e74c3c">OFFICE SABOTAGE</b><br>
        <small>E: Sabote Et | F: Öldür | WASD: Hareket</small>
    </div>

    <div id="killBtn" class="game-btn">ÖLDÜR<br>(F)</div>
    <div id="sabotageBtn" class="game-btn">SABOTE<br>(E)</div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const killBtnUI = document.getElementById("killBtn");
        const sabBtnUI = document.getElementById("sabotageBtn");

        // SESLER (Aynı)
        const walkSound = new Audio('walk.mp3'); walkSound.loop = true; walkSound.volume = 0.03;

        // GÖRSELLER (BodyImg zaten vardı)
        const mapImg = new Image(); mapImg.src = 'map.png';
        const collImg = new Image(); collImg.src = 'collision.png';
        const charIdle = new Image(); charIdle.src = 'character.png';
        const charWalk = new Image(); charWalk.src = 'character_walk_1.png';
        const victimImg = new Image(); victimImg.src = 'victim.png';
        const killImg1 = new Image(); killImg1.src = 'peter_kill_1.png';
        const killImg2 = new Image(); killImg2.src = 'peter_kill_2.png';
        const bodyImg = new Image(); bodyImg.src = 'body.png'; // Senin çizdiğin ceset

        // OYUN DEĞİŞKENLERİ
        let player = { x: 480, y: 350, width: 65, height: 91, speed: 4, visionRadius: 380, isMoving: false, facingRight: true, walkStep: 0, killTimer: 0 };
        let victim = { x: 580, y: 450, width: 65, height: 91, alive: true };
        let machines = [{ x: 809, y: 483, broken: false, particles: [] }];
        
        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionData = null;
        let collW = 0, collH = 0;
        let loaded = 0;

        function checkLoad() {
            loaded++;
            if(loaded === 8) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = collImg.width; tempCanvas.height = collImg.height;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.drawImage(collImg, 0, 0);
                collisionData = tCtx.getImageData(0, 0, collImg.width, collImg.height).data;
                collW = collImg.width; collH = collImg.height;
                requestAnimationFrame(gameLoop);
            }
        }
        [mapImg, collImg, charIdle, charWalk, victimImg, killImg1, killImg2, bodyImg].forEach(img => img.onload = checkLoad);

        // HIZLI COLLISION SYSTEM
        function getCollisionType(x, y) {
            if (!collisionData) return 0;
            const ix = Math.floor(x); const iy = Math.floor(y);
            if (ix < 0 || ix >= collW || iy < 0 || iy >= collH) return 1;
            const idx = (iy * collW + ix) * 4;
            if (collisionData[idx] > 150 && collisionData[idx+1] < 100) return 1; // Duvar
            if (collisionData[idx+1] > 150 && collisionData[idx] < 100) return 2; // Masa
            return 0;
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            if (player.killTimer > 0) { 
                player.killTimer--; 
                if (player.killTimer === 0) victim.alive = false; 
                walkSound.pause(); return; 
            }

            let dx = 0, dy = 0;
            if (keys["KeyW"]) dy -= 1; if (keys["KeyS"]) dy += 1;
            if (keys["KeyA"]) { dx -= 1; player.facingRight = false; }
            if (keys["KeyD"]) { dx += 1; player.facingRight = true; }

            player.isMoving = (dx !== 0 || dy !== 0);

            if (player.isMoving) {
                if (walkSound.paused) walkSound.play().catch(() => {});
                const angle = Math.atan2(dy, dx);
                const vx = Math.cos(angle) * player.speed;
                const vy = Math.sin(angle) * player.speed;

                if (getCollisionType(player.x + vx, player.y) === 0) player.x += vx;
                if (getCollisionType(player.x, player.y + vy) === 0) player.y += vy;
                player.walkStep += 0.15;
            } else { walkSound.pause(); player.walkStep = 0; }

            // SABOTAJ MESAFE KONTROLÜ
            let nearMachine = false;
            machines.forEach(m => {
                let d = Math.sqrt(Math.pow(player.x - m.x, 2) + Math.pow(player.y - m.y, 2));
                // d < 140 ile fotokopi makinesine yaklaşınca buton yanar
                if (d < 140 && !m.broken) { 
                    nearMachine = true;
                    if (keys["KeyE"]) m.broken = true;
                }
                if (m.broken && Math.random() > 0.7) {
                    m.particles.push({ x: m.x, y: m.y - 20, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1, color: Math.random()>0.5?"#fc0":"#f60"});
                }
                m.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02; if (p.life <= 0) m.particles.splice(i, 1); });
            });
            if (nearMachine) sabBtnUI.classList.add("active"); else sabBtnUI.classList.remove("active");

            // KILL MESAFE KONTROLÜ
            const distToVictim = Math.sqrt(Math.pow(player.x - victim.x, 2) + Math.pow(player.y - victim.y, 2));
            if (victim.alive && distToVictim < 85) {
                killBtnUI.classList.add("active");
                if (keys["KeyF"]) { player.killTimer = 100; player.facingRight = (victim.x > player.x); }
            } else { killBtnUI.classList.remove("active"); }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }

        function draw() {
            ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2; const cy = canvas.height / 2;

            // 1. ADIM: SİS (Haritayı %15 gör)
            ctx.save(); ctx.globalAlpha = 0.15; ctx.drawImage(mapImg, -camera.x, -camera.y); ctx.restore();

            // 2. ADIM: AYDINLIK ALAN (Raycasting)
            ctx.save();
            ctx.beginPath(); ctx.moveTo(cx, cy);
            const rayCount = 180;
            for (let i = 0; i <= rayCount; i++) {
                const angle = (i * (360 / rayCount) * Math.PI) / 180;
                let rx = player.x, ry = player.y;
                for (let d = 0; d < player.visionRadius; d += 8) {
                    rx += Math.cos(angle) * 8; ry += Math.sin(angle) * 8;
                    if (getCollisionType(rx, ry) === 1) break; // Sadece kırmızı duvar görüşü keser
                }
                ctx.lineTo(rx - camera.x, ry - camera.y);
            }
            ctx.closePath(); ctx.clip();

            // Aydınlık Harita
            ctx.drawImage(mapImg, -camera.x, -camera.y);
            
            // Makine Efektleri
            machines.forEach(m => {
                if (m.broken) {
                    ctx.fillStyle = "rgba(100, 100, 100, 0.4)";
                    for(let i=0; i<3; i++) { ctx.beginPath(); ctx.arc(m.x - camera.x + Math.sin(Date.now()/200 + i)*15, m.y - camera.y - 30 - (i*15), 15 + i*5, 0, Math.PI*2); ctx.fill(); }
                    m.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x - camera.x, p.y - camera.y, 3, 3); });
                    ctx.globalAlpha = 1;
                }
            });

            // KURBAN VE CESET / KAN ÇİZİMİ
            if (victim.alive) {
                // Kurban yaşıyorsa, victim.png'yi ayakta çiz
                ctx.drawImage(victimImg, victim.x - camera.x - victim.width/2, victim.y - camera.y - victim.height, victim.width, victim.height);
            } else {
                // Kurban öldüyse...
                
                // --- ADIM 1: KAN BİRİKİNTİSİ ÇİZİMİ (Yeni) ---
                // Cesedin hemen altına (victim.y'nin biraz altına) dinamik bir kan birikintisi ekle.
                ctx.save();
                ctx.fillStyle = "rgba(180, 0, 0, 0.65)"; // Yarı saydam koyu kırmızı
                ctx.beginPath();
                // Cesedin altında eliptik bir birikinti (Genişlik: 55, Yükseklik: 20)
                ctx.ellipse(victim.x - camera.x, victim.y - camera.y - 15, 55, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Ekstra gerçekçilik için küçük bir sıçrama noktası
                ctx.fillStyle = "rgba(160, 0, 0, 0.5)";
                ctx.beginPath();
                ctx.ellipse(victim.x - camera.x + 35, victim.y - camera.y - 5, 12, 6, Math.PI/4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // --- ADIM 2: CESET GÖRSELİ (Eski bodyImg çizimi) ---
                // Ceset görselini kanın üzerine çiz (body.png)
                // Cesedin genişlik ve yüksekliğini victimImg ile aynı tutuyoruz
                ctx.drawImage(bodyImg, victim.x - camera.x - victim.width/2, victim.y - camera.y - victim.height + 25, victim.width, victim.height);
            }
            ctx.restore();

            // 3. ADIM: KENAR YUMUŞATMA
            const grad = ctx.createRadialGradient(cx, cy, 150, cx, cy, player.visionRadius);
            grad.addColorStop(0, "rgba(0,0,0,0)"); grad.addColorStop(1, "rgba(0,0,0,0.85)");
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 4. ADIM: PETER ÇİZİMİ
            let currentImg = (player.isMoving && Math.floor(player.walkStep) % 2 === 1) ? charWalk : charIdle;
            if (player.killTimer > 0) currentImg = (player.killTimer > 50) ? killImg1 : killImg2;
            ctx.save(); ctx.translate(cx, cy); if (!player.facingRight) ctx.scale(-1, 1);
            ctx.drawImage(currentImg, -player.width/2, -player.height, player.width, player.height);
            ctx.restore();

            // Debug Konum
            ctx.fillStyle = "white"; ctx.font = "12px Arial";
            ctx.fillText("X: " + Math.floor(player.x) + " Y: " + Math.floor(player.y), 20, canvas.height - 20);
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    </script>
</body>
</html>
