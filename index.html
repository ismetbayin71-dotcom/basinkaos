<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Animated Peter</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #111; border: 2px solid #333; cursor: crosshair; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 1px solid #444; color: white; min-width: 180px; }
        .status { font-weight: bold; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="ui">
        <b>OFFICE SABOTAGE</b><br>
        Durum: <span id="phys-status" class="status" style="background: #c0392b;">Yükleniyor...</span><br>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <small>W-A-S-D: Hareket<br>Karakter: Sabotajcı Peter</small>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const physStatus = document.getElementById("phys-status");

        // GÖRSELLER
        const mapImg = new Image(); mapImg.src = 'map.jpg';
        const collImg = new Image(); collImg.src = 'collision.png';
        
        // Karakter Görselleri
        const charIdle = new Image(); charIdle.src = 'character.png';
        const charWalk = new Image(); charWalk.src = 'character_walk_1.png';

        let player = {
            x: 450, y: 300,
            width: 50, height: 75, // Karakterin ekrandaki boyutu
            speed: 3.5,
            isMoving: false,
            facingRight: true,
            animTimer: 0
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionCtx = null;
        let imagesLoaded = 0;

        function checkLoad() {
            imagesLoaded++;
            if(imagesLoaded === 4) { // map, collision, idle, walk
                initCollision();
                physStatus.innerText = "OYUN HAZIR";
                physStatus.style.background = "#27ae60";
                requestAnimationFrame(gameLoop);
            }
        }

        [mapImg, collImg, charIdle, charWalk].forEach(img => img.onload = checkLoad);

        function initCollision() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = collImg.width;
            tempCanvas.height = collImg.height;
            collisionCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            collisionCtx.drawImage(collImg, 0, 0);
        }

        function canMoveTo(nx, ny) {
            if (!collisionCtx) return true;
            // Karakterin ayak ucu koordinatları (Collision kontrolü için)
            const checkPoints = [
                {x: nx, y: ny + 30},
                {x: nx - 15, y: ny + 30},
                {x: nx + 15, y: ny + 30}
            ];
            for (let p of checkPoints) {
                const pixel = collisionCtx.getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
                if (pixel[3] > 0 && pixel[0] > 150) return false; // Kırmızı çizgi kontrolü
            }
            return true;
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            let dx = 0, dy = 0;
            if (keys["KeyW"]) dy -= 1;
            if (keys["KeyS"]) dy += 1;
            if (keys["KeyA"]) { dx -= 1; player.facingRight = false; }
            if (keys["KeyD"]) { dx += 1; player.facingRight = true; }

            player.isMoving = (dx !== 0 || dy !== 0);

            if (player.isMoving) {
                const angle = Math.atan2(dy, dx);
                const nextX = player.x + Math.cos(angle) * player.speed;
                const nextY = player.y + Math.sin(angle) * player.speed;

                if (canMoveTo(nextX, player.y)) player.x = nextX;
                if (canMoveTo(player.x, nextY)) player.y = nextY;
                
                player.animTimer += 0.15; // Yürüme sallantısı hızı
            } else {
                player.animTimer = 0;
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Harita
            ctx.drawImage(mapImg, 0, 0);

            // Karakter Çizimi
            const currentImg = (player.isMoving && Math.floor(player.animTimer) % 2 === 0) ? charWalk : charIdle;
            
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Eğer sola bakıyorsa görseli aynala
            if (!player.facingRight) ctx.scale(-1, 1);

            // Karakteri ortalayarak çiz
            ctx.drawImage(currentImg, -player.width/2, -player.height, player.width, player.height);
            ctx.restore();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
