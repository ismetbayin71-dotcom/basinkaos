<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Peter 2X Fix</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #111; border: 2px solid #333; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; color: white; font-family: sans-serif; z-index: 100; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#e74c3c">OFFICE SABOTAGE</b><br>
        <small id="pos">Peter Hazır</small>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // GÖRSELLER (GitHub isimlerine göre: map.png, collision.png)
        const mapImg = new Image(); mapImg.src = 'map.png';
        const collImg = new Image(); collImg.src = 'collision.png';
        const charIdle = new Image(); charIdle.src = 'character.png';
        const charWalk = new Image(); charWalk.src = 'character_walk_1.png';

        let player = {
            x: 480, y: 320, // Başlangıç yerini biraz kaydırdım (duvara sıkışmaması için)
            width: 100, height: 140, // 2X Boyut
            speed: 5,
            visionRadius: 300, 
            isMoving: false,
            facingRight: true,
            animTimer: 0
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionCtx = null;
        let loaded = 0;

        function checkLoad() {
            loaded++;
            if(loaded === 4) {
                initCollision();
                requestAnimationFrame(gameLoop);
            }
        }
        [mapImg, collImg, charIdle, charWalk].forEach(img => img.onload = checkLoad);

        function initCollision() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = collImg.width;
            tempCanvas.height = collImg.height;
            collisionCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            collisionCtx.drawImage(collImg, 0, 0);
        }

        function isWall(x, y) {
            if (!collisionCtx) return false;
            // Harita sınırları dışı duvardır
            if (x < 0 || x >= collImg.width || y < 0 || y >= collImg.height) return true;
            const p = collisionCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
            // Sadece saf kırmızı çizgileri (duvarları) kontrol et
            return (p[0] > 180 && p[1] < 100 && p[2] < 100);
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            let dx = 0, dy = 0;
            if (keys["KeyW"]) dy -= 1;
            if (keys["KeyS"]) dy += 1;
            if (keys["KeyA"]) { dx -= 1; player.facingRight = false; }
            if (keys["KeyD"]) { dx += 1; player.facingRight = true; }

            player.isMoving = (dx !== 0 || dy !== 0);

            if (player.isMoving) {
                const angle = Math.atan2(dy, dx);
                const nextX = player.x + Math.cos(angle) * player.speed;
                const nextY = player.y + Math.sin(angle) * player.speed;

                // Collision kontrolü: Ayak tabanının merkezini ve yanlarını kontrol et
                if (!isWall(nextX, player.y) && !isWall(nextX-20, player.y) && !isWall(nextX+20, player.y)) {
                    player.x = nextX;
                }
                if (!isWall(player.x, nextY) && !isWall(player.x-20, nextY) && !isWall(player.x+20, nextY)) {
                    player.y = nextY;
                }
                player.animTimer += 0.2;
            } else {
                player.animTimer = 0;
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            document.getElementById("pos").innerText = `Konum: ${Math.round(player.x)}, ${Math.round(player.y)}`;
        }

        function draw() {
            // 1. Zemini çiz (Siyah)
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Işık Efekti ve Harita Maskeleme
            ctx.save();
            
            // Işık dairesi oluştur
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2 - 30, player.visionRadius, 0, Math.PI*2);
            ctx.clip(); // Sadece bu dairenin içini çizilebilir yap

            // Haritayı çiz (Sadece dairenin içi görünecek)
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            ctx.drawImage(mapImg, 0, 0);
            ctx.restore();
            
            ctx.restore();

            // 3. Karanlık Yumuşatma (Kenarların Among Us gibi loş olması için)
            const grad = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2 - 30, player.visionRadius * 0.4,
                canvas.width/2, canvas.height/2 - 30, player.visionRadius
            );
            grad.addColorStop(0, "rgba(0,0,0,0)");
            grad.addColorStop(1, "rgba(0,0,0,0.8)");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 4. Karakter
            const img = (player.isMoving && Math.floor(player.animTimer) % 2 === 0) ? charWalk : charIdle;
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            if (!player.facingRight) ctx.scale(-1, 1);
            ctx.drawImage(img, -player.width/2, -player.height + 10, player.width, player.height);
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
