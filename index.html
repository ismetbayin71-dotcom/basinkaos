<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Final Prototype</title>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { background: #111; border: 2px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); image-rendering: auto; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #444; z-index: 10; min-width: 150px; }
        .key-hint { color: #f1c40f; font-weight: bold; }
        #debug-info { margin-top: 10px; font-size: 11px; color: #888; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 16px; margin-bottom: 5px; border-bottom: 1px solid #555; padding-bottom: 5px;">Ofis Sabotaj v1.0</div>
        Hareket: <span class="key-hint">W-A-S-D</span><br>
        Görüş: <span class="key-hint">Aktif (Fog)</span>
        <div id="debug-info">
            Konum: <span id="pos-display">200, 400</span><br>
            Kamera: <span id="cam-display">0, 0</span>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const posDisplay = document.getElementById("pos-display");
        const camDisplay = document.getElementById("cam-display");

        const mapImg = new Image();
        mapImg.src = 'map.png';

        // --- OYUNCU VE DÜNYA AYARLARI ---
        let game = {
            zoom: 1.8, // %180 yakınlaştırma
            debugMode: false // true yaparsan duvarların içinden geçebilirsin
        };

        let player = {
            x: 200, // Sol koridor (Güvenli başlangıç)
            y: 400, 
            radius: 12, 
            color: '#c0392b', // Among Us Kırmızı
            speed: 4,
            vision: 280
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionCtx = null;

        // --- GİRİŞLER ---
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        mapImg.onload = function() {
            // Çarpışma verilerini okumak için arka plan canvas'ı
            const collCanvas = document.createElement('canvas');
            collCanvas.width = mapImg.width;
            collCanvas.height = mapImg.height;
            collisionCtx = collCanvas.getContext('2d', { willReadFrequently: true });
            collisionCtx.drawImage(mapImg, 0, 0);
            
            requestAnimationFrame(gameLoop);
        };

        // --- GELİŞMİŞ ÇARPIŞMA SİSTEMİ ---
        function canMoveTo(nx, ny) {
            if (game.debugMode) return true; // Debug açıksa duvar yok
            if (!collisionCtx) return true;

            const checkPoints = [
                {x: nx, y: ny},             // Merkez
                {x: nx - 8, y: ny},         // Sol kenar
                {x: nx + 8, y: ny},         // Sağ kenar
                {x: nx, y: ny - 8},         // Üst kenar
                {x: nx, y: ny + 8}          // Alt kenar
            ];

            for (let p of checkPoints) {
                // Harita sınırları dışı
                if (p.x < 0 || p.x > mapImg.width || p.y < 0 || p.y > mapImg.height) return false;

                const pixel = collisionCtx.getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
                const r = pixel[0], g = pixel[1], b = pixel[2];

                // DUVAR: Siyah alanlar (RGB < 60)
                if (r < 60 && g < 60 && b < 60) return false;

                // PENCERE: Parlak beyaz alanlar (RGB > 230)
                if (r > 230 && g > 230 && b > 230) return false;
                
                // MASA: Koyu kahve/gri tonları
                if (r > 150 && r < 190 && g > 130 && g < 170) return false; 
            }
            return true;
        }

        function update() {
            let nextX = player.x;
            let nextY = player.y;

            if (keys["KeyW"]) nextY -= player.speed;
            if (keys["KeyS"]) nextY += player.speed;
            if (keys["KeyA"]) nextX -= player.speed;
            if (keys["KeyD"]) nextX += player.speed;

            // X ve Y çarpışmaları ayrı ayrı kontrol (Duvara sürtünme için)
            if (canMoveTo(nextX, player.y)) player.x = nextX;
            if (canMoveTo(player.x, nextY)) player.y = nextY;

            // Kamera Takibi
            camera.x = player.x - (canvas.width / 2) / game.zoom;
            camera.y = player.y - (canvas.height / 2) / game.zoom;

            // Harita sınırlarında kamerayı durdur
            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (camera.x > mapImg.width - canvas.width / game.zoom) camera.x = mapImg.width - canvas.width / game.zoom;
            if (camera.y > mapImg.height - canvas.height / game.zoom) camera.y = mapImg.height - canvas.height / game.zoom;

            posDisplay.innerText = `${Math.round(player.x)}, ${Math.round(player.y)}`;
            camDisplay.innerText = `${Math.round(camera.x)}, ${Math.round(camera.y)}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(game.zoom, game.zoom);
            ctx.translate(-camera.x, -camera.y);

            // 1. Harita
            ctx.drawImage(mapImg, 0, 0);

            // 2. Oyuncu
            drawPlayer(player.x, player.y);

            // 3. Sis (Fog)
            applyFogOfWar();

            ctx.restore();
        }

        function drawPlayer(x, y) {
            ctx.save();
            ctx.translate(x, y);
            // Karakter Gövdesi
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI * 2); ctx.fill();
            // Çanta
            ctx.fillRect(-player.radius - 4, -4, 6, 14);
            // Gözlük
            ctx.fillStyle = "#add8e6"; ctx.fillRect(2, -7, 12, 8);
            ctx.restore();
        }

        function applyFogOfWar() {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            let grad = ctx.createRadialGradient(player.x, player.y, 60, player.x, player.y, player.vision);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(0.8, 'rgba(0,0,0,0.3)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.vision, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, mapImg.width, mapImg.height);
            ctx.globalCompositeOperation = 'source-over';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
