<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Hybrid Controls</title>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #111; border: 2px solid #333; cursor: crosshair; box-shadow: 0 0 40px rgba(0,0,0,1); }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; font-size: 13px; z-index: 10; border: 1px solid #444; line-height: 1.6; }
        .highlight { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <b>KONTROLLER</b><br>
        Klavye: <span class="highlight">W-A-S-D</span><br>
        Mouse: <span class="highlight">Sol Tık (Basılı Tut)</span><br>
        Görüş: <span class="highlight">360° Çevresel</span>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const mapImg = new Image();
        mapImg.src = 'map.png';

        let game = { zoom: 2.0 }; 

        let player = {
            x: 200, y: 400,
            radius: 12,
            color: '#c0392b',
            speed: 4,
            angle: 0,
            visionRadius: 260,
            isMouseMoving: false
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let mouse = { x: 0, y: 0 };

        // --- GİRDİ DİNLEYİCİLERİ ---
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);
        
        canvas.addEventListener("mousedown", e => { if(e.button === 0) player.isMouseMoving = true; });
        window.addEventListener("mouseup", e => { if(e.button === 0) player.isMouseMoving = false; });
        
        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        mapImg.onload = () => requestAnimationFrame(gameLoop);

        function update() {
            let moveX = 0;
            let moveY = 0;

            // 1. KLAVYE KONTROLÜ (W-A-S-D)
            if (keys["KeyW"] || keys["ArrowUp"]) moveY -= 1;
            if (keys["KeyS"] || keys["ArrowDown"]) moveY += 1;
            if (keys["KeyA"] || keys["ArrowLeft"]) moveX -= 1;
            if (keys["KeyD"] || keys["ArrowRight"]) moveX += 1;

            // 2. MOUSE KONTROLÜ (Eğer klavye kullanılmıyorsa ve tıklandıysa)
            if (moveX === 0 && moveY === 0 && player.isMouseMoving) {
                const worldMouseX = (mouse.x / game.zoom + camera.x);
                const worldMouseY = (mouse.y / game.zoom + camera.y);
                
                const dx = worldMouseX - player.x;
                const dy = worldMouseY - player.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 5) {
                    const angle = Math.atan2(dy, dx);
                    moveX = Math.cos(angle);
                    moveY = Math.sin(angle);
                }
            }

            // Hareketi uygula
            if (moveX !== 0 || moveY !== 0) {
                // Çapraz hız sabitleme (Normalizasyon)
                const length = Math.sqrt(moveX * moveX + moveY * moveY);
                player.x += (moveX / length) * player.speed;
                player.y += (moveY / length) * player.speed;
                
                // Bakış açısını yürüdüğü yöne çevir
                player.angle = Math.atan2(moveY, moveX);
            }

            // Kamera Takibi
            camera.x = player.x - (canvas.width / 2) / game.zoom;
            camera.y = player.y - (canvas.height / 2) / game.zoom;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(game.zoom, game.zoom);
            ctx.translate(-camera.x, -camera.y);

            // 1. Harita
            ctx.drawImage(mapImg, 0, 0);

            // 2. Oyuncu
            drawPlayer();

            // 3. Among Us Görüşü
            applyVision();

            ctx.restore();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle); 
            
            // Gövde
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI * 2); ctx.fill();
            // Çanta
            ctx.fillRect(-player.radius - 4, -5, 6, 10);
            // Gözlük
            ctx.fillStyle = "#add8e6";
            ctx.fillRect(4, -5, 8, 6);
            ctx.restore();
        }

        function applyVision() {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';

            let grad = ctx.createRadialGradient(
                player.x, player.y, 40,           
                player.x, player.y, player.visionRadius 
            );
            
            grad.addColorStop(0, 'rgba(0,0,0,1)');   
            grad.addColorStop(0.7, 'rgba(0,0,0,0.4)'); 
            grad.addColorStop(1, 'rgba(0,0,0,0)');   

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.visionRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, mapImg.width, mapImg.height);
            ctx.globalCompositeOperation = 'source-over';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
