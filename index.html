<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Peter Mini</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #333; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; color: white; font-family: sans-serif; z-index: 100; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#e74c3c">OFFICE SABOTAGE</b><br>
        <small>Boyut: 0.5x | Durum: Yere Sabit</small>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const mapImg = new Image(); mapImg.src = 'map.png';
        const collImg = new Image(); collImg.src = 'collision.png';
        const charIdle = new Image(); charIdle.src = 'character.png';
        const charWalk = new Image(); charWalk.src = 'character_walk_1.png';

        let player = {
            x: 480, y: 350,
            // Boyutlar yarıya indirildi
            width: 50, height: 70, 
            speed: 3.8,
            visionRadius: 320,
            isMoving: false,
            facingRight: true,
            walkStep: 0
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionCtx = null;
        let loaded = 0;

        function checkLoad() {
            loaded++;
            if(loaded === 4) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = collImg.width;
                tempCanvas.height = collImg.height;
                collisionCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
                collisionCtx.drawImage(collImg, 0, 0);
                requestAnimationFrame(gameLoop);
            }
        }
        [mapImg, collImg, charIdle, charWalk].forEach(img => img.onload = checkLoad);

        function isWall(x, y) {
            if (!collisionCtx) return false;
            if (x < 0 || x >= collImg.width || y < 0 || y >= collImg.height) return true;
            const p = collisionCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
            // Kırmızı maske kontrolü
            return (p[0] > 150 && p[1] < 100);
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            let dx = 0, dy = 0;
            if (keys["KeyW"]) dy -= 1;
            if (keys["KeyS"]) dy += 1;
            if (keys["KeyA"]) { dx -= 1; player.facingRight = false; }
            if (keys["KeyD"]) { dx += 1; player.facingRight = true; }

            player.isMoving = (dx !== 0 || dy !== 0);

            if (player.isMoving) {
                const angle = Math.atan2(dy, dx);
                const nextX = player.x + Math.cos(angle) * player.speed;
                const nextY = player.y + Math.sin(angle) * player.speed;

                // Küçük Peter için daha dar collision (çarpışma) alanı
                const fw = 12; 
                if (!isWall(nextX, player.y) && !isWall(nextX - fw, player.y) && !isWall(nextX + fw, player.y)) {
                    player.x = nextX;
                }
                if (!isWall(player.x, nextY) && !isWall(player.x - fw, nextY) && !isWall(player.x + fw, nextY)) {
                    player.y = nextY;
                }
                
                player.walkStep += 0.15;
            } else {
                player.walkStep = 0;
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. HARİTA VE SIS
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, player.visionRadius, 0, Math.PI * 2);
            ctx.clip();
            ctx.translate(-camera.x, -camera.y);
            ctx.drawImage(mapImg, 0, 0);
            ctx.restore();

            const grad = ctx.createRadialGradient(cx, cy, player.visionRadius * 0.5, cx, cy, player.visionRadius);
            grad.addColorStop(0, "rgba(0,0,0,0)");
            grad.addColorStop(1, "rgba(0,0,0,1)");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. PETER VE GÖLGE
            const img = (player.isMoving && Math.floor(player.walkStep) % 2 === 1) ? charWalk : charIdle;

            ctx.save();
            ctx.translate(cx, cy); 
            
            if (!player.facingRight) ctx.scale(-1, 1);
            
            // GÖLGE: Peter küçüldüğü için gölgeyi de küçülttüm
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.beginPath();
            ctx.ellipse(0, 0, 20, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // PETER: Ayakları tam (0,0) noktasına gelecek şekilde çiziliyor
            ctx.drawImage(img, -player.width/2, -player.height, player.width, player.height);
            
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
