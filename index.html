<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Peter Smooth & Fixed Collision</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #333; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; color: white; font-family: sans-serif; z-index: 100; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#e74c3c">OFFICE SABOTAGE</b><br>
        <small>Durum: Peter Güvende | Görüş: Yumuşak</small>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // GÖRSELLER
        const mapImg = new Image(); mapImg.src = 'map.png';
        const collImg = new Image(); collImg.src = 'collision.png';
        const charIdle = new Image(); charIdle.src = 'character.png';
        const charWalk = new Image(); charWalk.src = 'character_walk_1.png';

        let player = {
            x: 480, y: 320,
            width: 100, height: 140,
            speed: 4.2,
            visionRadius: 380,
            isMoving: false,
            facingRight: true,
            animTimer: 0
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let collisionCtx = null;
        let loaded = 0;

        function checkLoad() {
            loaded++;
            if(loaded === 4) {
                initCollision();
                requestAnimationFrame(gameLoop);
            }
        }
        [mapImg, collImg, charIdle, charWalk].forEach(img => img.onload = checkLoad);

        function initCollision() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = collImg.width;
            tempCanvas.height = collImg.height;
            collisionCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            collisionCtx.drawImage(collImg, 0, 0);
        }

        // --- GELİŞMİŞ COLLISION KONTROLÜ ---
        function isWall(x, y) {
            if (!collisionCtx) return false;
            if (x < 0 || x >= collImg.width || y < 0 || y >= collImg.height) return true;
            
            const p = collisionCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
            // Saf kırmızı (R > 180) ve diğer renklerin düşük olması (Bozulmayı engeller)
            return (p[0] > 180 && p[1] < 100 && p[2] < 100 && p[3] > 0);
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            let dx = 0, dy = 0;
            if (keys["KeyW"]) dy -= 1;
            if (keys["KeyS"]) dy += 1;
            if (keys["KeyA"]) { dx -= 1; player.facingRight = false; }
            if (keys["KeyD"]) { dx += 1; player.facingRight = true; }

            player.isMoving = (dx !== 0 || dy !== 0);

            if (player.isMoving) {
                const angle = Math.atan2(dy, dx);
                const moveX = Math.cos(angle) * player.speed;
                const moveY = Math.sin(angle) * player.speed;

                const nextX = player.x + moveX;
                const nextY = player.y + moveY;

                // Çarpışma noktaları (Peter'ın ayak tabanı için 3 nokta)
                const offset = 20; 
                if (!isWall(nextX, player.y) && !isWall(nextX - offset, player.y) && !isWall(nextX + offset, player.y)) {
                    player.x = nextX;
                }
                if (!isWall(player.x, nextY) && !isWall(player.x - offset, nextY) && !isWall(player.x + offset, nextY)) {
                    player.y = nextY;
                }
                
                player.animTimer += 0.08; // Yavaş ve sakin animasyon hızı
            } else {
                player.animTimer = 0;
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }

        function draw() {
            // Önce her şeyi temizle (Siyah zemin)
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. HARİTA (Sadece görüş alanı içinde çizilecek)
            ctx.save();
            // Görüş alanı maskesi oluştur
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 - 20;

            ctx.beginPath();
            ctx.arc(cx, cy, player.visionRadius, 0, Math.PI * 2);
            ctx.clip(); // Bu daire dışını çizme

            // Haritayı kameraya göre çiz
            ctx.translate(-camera.x, -camera.y);
            ctx.drawImage(mapImg, 0, 0);
            ctx.restore();

            // 2. YUMUŞAK SİS GEÇİŞİ (Kenarların sertliğini alır)
            const grad = ctx.createRadialGradient(cx, cy, player.visionRadius * 0.5, cx, cy, player.visionRadius);
            grad.addColorStop(0, "rgba(0,0,0,0)");
            grad.addColorStop(1, "rgba(0,0,0,1)"); // Kenarlar tam siyah
            
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. PETER
            const isWalkFrame = Math.floor(player.animTimer * 10) % 20 < 10;
            const img = (player.isMoving && isWalkFrame) ? charWalk : charIdle;

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            if (!player.facingRight) ctx.scale(-1, 1);
            
            // Ayak altı gölgesi
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath();
            ctx.ellipse(0, 5, 35, 12, 0, 0, Math.PI*2);
            ctx.fill();

            // Peter'ı çiz
            ctx.drawImage(img, -player.width/2, -player.height + 15, player.width, player.height);
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
