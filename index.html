<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Collision Fix</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #111; border: 2px solid #333; cursor: crosshair; }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 1px solid #444; color: white; min-width: 180px; }
        .status { font-weight: bold; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="ui">
        <b>SİSTEM DURUMU</b><br>
        Fizik: <span id="phys-status" class="status" style="background: #c0392b;">Yükleniyor...</span><br>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <small>W-A-S-D: Hareket<br>Mouse Tık: Git</small>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const physStatus = document.getElementById("phys-status");

        // GÖRSELLERİ ÖZEL AYARLA YÜKLE
        const mapImg = new Image();
        mapImg.crossOrigin = "Anonymous"; 
        mapImg.src = 'map.png?v=' + Date.now(); // Cache temizleme için timestamp

        const collImg = new Image();
        collImg.crossOrigin = "Anonymous";
        collImg.src = 'collision.png?v=' + Date.now();

        let game = { zoom: 1.8 };
        let player = {
            x: 450, y: 350, // Güvenli spawn
            radius: 10,
            color: '#c0392b',
            speed: 3.5,
            angle: 0,
            visionRadius: 280,
            isMouseMoving: false
        };

        let camera = { x: 0, y: 0 };
        let keys = {};
        let mouse = { x: 0, y: 0 };
        let collisionCtx = null;

        let imagesLoaded = 0;
        function checkLoad() {
            imagesLoaded++;
            if(imagesLoaded === 2) {
                initCollision();
                physStatus.innerText = "AKTİF";
                physStatus.style.background = "#27ae60";
                requestAnimationFrame(gameLoop);
            }
        }
        mapImg.onload = checkLoad;
        collImg.onload = checkLoad;

        function initCollision() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = collImg.width;
            tempCanvas.height = collImg.height;
            collisionCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            collisionCtx.drawImage(collImg, 0, 0);
        }

        // --- ÇARPIŞMA KONTROLÜ ---
        function canMoveTo(nx, ny) {
            if (!collisionCtx) return true;

            // Karakterin etrafındaki 8 noktayı kontrol ederek duvarın içine sızmayı engelle
            const checkPoints = [
                {x: nx, y: ny},
                {x: nx - 9, y: ny}, {x: nx + 9, y: ny},
                {x: nx, y: ny - 9}, {x: nx, y: ny + 9},
                {x: nx - 6, y: ny - 6}, {x: nx + 6, y: ny + 6}
            ];

            for (let p of checkPoints) {
                if (p.x < 0 || p.x > collImg.width || p.y < 0 || p.y > collImg.height) return false;

                const pixel = collisionCtx.getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
                const r = pixel[0], g = pixel[1], b = pixel[2], a = pixel[3];

                // Şeffaf olmayan ve Pembe (veya Pembeye yakın) olan her şeyi blokla
                // Senin çizimindeki pembe tonu: R ve B yüksek, G düşük
                if (a > 0 && r > 150 && b > 150 && g < 160) {
                    return false; 
                }
            }
            return true;
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);
        canvas.addEventListener("mousedown", e => { if(e.button === 0) player.isMouseMoving = true; });
        window.addEventListener("mouseup", e => { if(e.button === 0) player.isMouseMoving = false; });
        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        function update() {
            let mx = 0, my = 0;
            if (keys["KeyW"]) my -= 1; if (keys["KeyS"]) my += 1;
            if (keys["KeyA"]) mx -= 1; if (keys["KeyD"]) mx += 1;

            if (mx === 0 && my === 0 && player.isMouseMoving) {
                const worldM = { x: mouse.x / game.zoom + camera.x, y: mouse.y / game.zoom + camera.y };
                mx = worldM.x - player.x; my = worldM.y - player.y;
            }

            if (mx !== 0 || my !== 0) {
                const angle = Math.atan2(my, mx);
                const nextX = player.x + Math.cos(angle) * player.speed;
                const nextY = player.y + Math.sin(angle) * player.speed;

                // Sürtünme fiziği (Kayma hissi)
                if (canMoveTo(nextX, player.y)) player.x = nextX;
                if (canMoveTo(player.x, nextY)) player.y = nextY;
                
                player.angle = angle;
            }

            camera.x = player.x - (canvas.width / 2) / game.zoom;
            camera.y = player.y - (canvas.height / 2) / game.zoom;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(game.zoom, game.zoom);
            ctx.translate(-camera.x, -camera.y);

            ctx.drawImage(mapImg, 0, 0); 
            
            // Oyuncu
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#add8e6"; ctx.fillRect(3, -4, 7, 5); // Vizör
            ctx.restore();

            // Among Us Görüş Sistemi
            applyVision();

            ctx.restore();
        }

        function applyVision() {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            let grad = ctx.createRadialGradient(player.x, player.y, 50, player.x, player.y, player.visionRadius);
            grad.addColorStop(0, 'rgba(0,0,0,1)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.visionRadius, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = "black";
            ctx.fillRect(camera.x - 50, camera.y - 50, (canvas.width/game.zoom) + 100, (canvas.height/game.zoom) + 100);
            ctx.globalCompositeOperation = 'source-over';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
