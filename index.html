<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Mouse Control Pro</title>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #111; border: 2px solid #333; cursor: crosshair; box-shadow: 0 0 40px rgba(0,0,0,1); }
        #ui { position: absolute; top: 15px; left: 15px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; font-size: 13px; z-index: 10; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <b>GÖRÜŞ:</b> Mouse'u Hareket Ettir<br>
        <b>HAREKET:</b> Mouse Sol Tık (Basılı Tut)<br>
        <hr style="border:0; border-top:1px solid #444; margin:8px 0;">
        <span id="status">Bekliyor...</span>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusText = document.getElementById("status");

        const mapImg = new Image();
        mapImg.src = 'map.png';

        let game = { 
            zoom: 1.8, 
            fov: 100 * (Math.PI / 180), // Görüş açısı genişliği
            smoothness: 0.15 // Fenerin mouse'u takip hızı
        };

        let player = {
            x: 200, y: 400,
            radius: 12,
            color: '#c0392b',
            speed: 4,
            angle: 0, // Fenerin baktığı açı
            visionRadius: 320,
            isMoving: false
        };

        let camera = { x: 0, y: 0 };
        let mouse = { x: 0, y: 0 };

        // --- MOUSE OLAYLARI ---
        window.addEventListener("mousedown", (e) => { if(e.button === 0) player.isMoving = true; });
        window.addEventListener("mouseup", (e) => { if(e.button === 0) player.isMoving = false; });
        
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        mapImg.onload = () => requestAnimationFrame(gameLoop);

        function update() {
            // --- 1. FENER AÇISINI HESAPLA (DAİMA MOUSE'A BAKAR) ---
            const screenPX = (player.x - camera.x) * game.zoom;
            const screenPY = (player.y - camera.y) * game.zoom;
            const targetAngle = Math.atan2(mouse.y - screenPY, mouse.x - screenPX);

            // Yumuşak dönüş (Smoothing)
            let diff = targetAngle - player.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            player.angle += diff * game.smoothness;

            // --- 2. HAREKET (SOL TIK BASILIYSA MOUSE'A DOĞRU GİT) ---
            if (player.isMoving) {
                // Karakterin mevcut konumundan mouse'un haritadaki konumuna olan açı
                // (Fener açısıyla aynı olabilir ama fener yumuşatılmış olduğu için bağımsız hesaplıyoruz)
                const moveAngle = targetAngle; 
                
                // Mouse ile karakter arasındaki mesafeyi kontrol et (Dibine gelince titremesin)
                const dx = (mouse.x / game.zoom + camera.x) - player.x;
                const dy = (mouse.y / game.zoom + camera.y) - player.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 10) {
                    player.x += Math.cos(moveAngle) * player.speed;
                    player.y += Math.sin(moveAngle) * player.speed;
                    statusText.innerText = "Yürüyor...";
                }
            } else {
                statusText.innerText = "Etrafa Bakıyor...";
            }

            // --- 3. KAMERA TAKİBİ ---
            camera.x = player.x - (canvas.width / 2) / game.zoom;
            camera.y = player.y - (canvas.height / 2) / game.zoom;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(game.zoom, game.zoom);
            ctx.translate(-camera.x, -camera.y);

            // 1. Harita
            ctx.drawImage(mapImg, 0, 0);

            // 2. Oyuncu
            drawPlayer();

            // 3. Dinamik Fener (Görüş Alanı)
            applyLineOfSight();

            ctx.restore();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle); // Karakter fenerin baktığı yöne döner
            
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(-player.radius - 4, -5, 6, 10); // Çanta
            
            ctx.fillStyle = "#add8e6";
            ctx.fillRect(4, -5, 8, 6); // Gözlük
            ctx.restore();
        }

        function applyLineOfSight() {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';

            const startAngle = player.angle - game.fov / 2;
            const endAngle = player.angle + game.fov / 2;

            let grad = ctx.createRadialGradient(player.x, player.y, 30, player.x, player.y, player.visionRadius);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(0.8, 'rgba(0,0,0,0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.arc(player.x, player.y, player.visionRadius, startAngle, endAngle);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, mapImg.width, mapImg.height);
            ctx.globalCompositeOperation = 'source-over';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
