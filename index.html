<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Office Sabotage - Click to Move</title>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #111; border: 2px solid #333; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; font-size: 13px; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui">
        HAREKET: <span style="color:#f1c40f">Fare Sol Tık (Hedef Belirle)</span><br>
        DURUM: <span id="status">Bekliyor</span>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusText = document.getElementById("status");

        const mapImg = new Image();
        mapImg.src = 'map.png';

        let game = { zoom: 1.8, fov: 100 * (Math.PI / 180) };

        let player = {
            x: 200, y: 400,
            radius: 12,
            color: '#c0392b',
            speed: 4,
            angle: 0,
            visionRadius: 320,
            target: null // Gidilecek hedef noktası {x, y}
        };

        let camera = { x: 0, y: 0 };

        // --- TIKLAMA OLAYI ---
        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Tıklanan yerin haritadaki gerçek koordinatını hesapla (Zoom ve Kamera dahil)
            player.target = {
                x: (clickX / game.zoom) + camera.x,
                y: (clickY / game.zoom) + camera.y
            };
            statusText.innerText = "Yürüyor...";
        });

        mapImg.onload = () => requestAnimationFrame(gameLoop);

        function update() {
            if (player.target) {
                // Hedefe olan mesafe ve açı
                const dx = player.target.x - player.x;
                const dy = player.target.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 5) { // Hedefe çok yakın değilse yürü
                    player.angle = Math.atan2(dy, dx);
                    player.x += Math.cos(player.angle) * player.speed;
                    player.y += Math.sin(player.angle) * player.speed;
                } else {
                    player.target = null; // Hedefe varıldı
                    statusText.innerText = "Bekliyor";
                }
            }

            // Kamera Takibi
            camera.x = player.x - (canvas.width / 2) / game.zoom;
            camera.y = player.y - (canvas.height / 2) / game.zoom;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(game.zoom, game.zoom);
            ctx.translate(-camera.x, -camera.y);

            // 1. Harita
            ctx.drawImage(mapImg, 0, 0);

            // 2. Hedef İşaretçisi (Opsiyonel)
            if (player.target) {
                ctx.strokeStyle = "rgba(241, 196, 15, 0.5)";
                ctx.beginPath();
                ctx.arc(player.target.x, player.target.y, 5, 0, Math.PI*2);
                ctx.stroke();
            }

            // 3. Oyuncu
            drawPlayer();

            // 4. Fener (Görüş Alanı)
            applyLineOfSight();

            ctx.restore();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(-player.radius - 4, -5, 6, 10); // Çanta
            
            ctx.fillStyle = "#add8e6";
            ctx.fillRect(4, -5, 8, 6); // Gözlük
            ctx.restore();
        }

        function applyLineOfSight() {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';

            const startAngle = player.angle - game.fov / 2;
            const endAngle = player.angle + game.fov / 2;

            let grad = ctx.createRadialGradient(player.x, player.y, 30, player.x, player.y, player.visionRadius);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(0.8, 'rgba(0,0,0,0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.arc(player.x, player.y, player.visionRadius, startAngle, endAngle);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, mapImg.width, mapImg.height);
            ctx.globalCompositeOperation = 'source-over';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
